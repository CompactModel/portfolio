services:

  php:
    build: .
    container_name: symfony_php
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "8080:80"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8085:8085"
    volumes:
      - ./app:/var/www/html
      - ./demo-sites:/var/www/demo-sites
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: symfony_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  node:
    image: node:20
    container_name: node_app
    working_dir: /app
    volumes:
      - ./node-app:/app
    ports:
      - "3001:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=3001
    command: sh -c "npm install --legacy-peer-deps && npm start"
    networks:
      - app-network
volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
